services:
  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: always
    ports:
      - "8080:8080"

    environment:
      - SERVER_PORT=8080
      - SPRING_PROFILES_ACTIVE=${PROFILE_SPRING}

      # Seguridad
      - ISSUER_URI_KEYCLOAK=${ISSUER_URI_KEYCLOAK}
      - JWK_SET_URI_KEYCLOAK=${JWK_SET_URI_KEYCLOAK}

      # Rutas
      - URI_PADRON=${URI_PADRON}
      - URI_CALCULO=${URI_CALCULO}

    networks:
      - siim-network

networks:
  siim-network:
    name: siim-global-net
    external: true