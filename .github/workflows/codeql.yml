name: CodeQL

on:
  push:
    branches: [ "main", "develop", "qa" ]
  pull_request:
    branches: [ "main", "develop", "qa" ]
  schedule:
    # Escaneo semanal automático (best practice)
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL Analysis (Java)
    runs-on: ubuntu-latest

    steps:
      # 1️Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Java 21
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      # Initialize CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java
          # Puedes usar queries de seguridad extendidas
          queries: security-extended

      # Build del proyecto
      # Recomendado para Maven en lugar de autobuild
      - name: Build project
        run: mvn clean compile --no-transfer-progress

      # Analyze
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
