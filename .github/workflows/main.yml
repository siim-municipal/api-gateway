name: Qodana
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
      - 'releases/*'

jobs:
  qodana:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.pull_request.head.sha }}  # to check out the actual pull request commit, not the merge commit
          fetch-depth: 0  # a full history is required for pull request analysis
      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2025.3
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN }} # read the steps about it below
          
      - name: Qodana Scan Badge
        uses: joaofouyer/qodana-action-badge@0.5.0
        with:
          # The output from Qodana Scan. {{ steps.qodana_scan.outputs.summary }}
          qodana-output: 
           Generate Test Coverage Badge
          generate-coverage: # optional, default is false
           Generate Code Quality Badge
          generate-quality: # optional, default is false
           Generate a button to Qodana Report with link
          
          
