server:
  port: 9090

spring:
  application:
    name: api-gateway

  # 1. CONEXIÓN REACTIVA (Para el flujo del Gateway - R2DBC)
  r2dbc:
    url: ${URL_BD_GATEWAY:r2dbc:postgresql://postgres-db:5432/gateway_db}
    username: ${USER_NAME_BD}
    password: ${PASSWORD_BD}

  # 2. CONEXIÓN JDBC (SOLO para Liquibase - Bloqueante)
  datasource:
    url: ${URL_BD_GATEWAY_JDBC:jdbc:postgresql://postgres-db:5432/gateway_db}
    username: ${USER_NAME_BD}
    password: ${PASSWORD_BD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # 3. CONFIGURACIÓN LIQUIBASE
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml

  # 4. CONFIGURACIÓN GATEWAY
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "http://localhost:4200"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
                allowCredentials: true
          discovery:
            locator:
              enabled: true
              lower-case-service-id: true

  # SEGURIDAD
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${ISSUER_URI_KEYCLOAK:http://localhost:8180/realms/tuxtepec-gob}
          jwk-set-uri: ${JWK_SET_URI_KEYCLOAK:http://keycloak:8180/realms/tuxtepec-gob/protocol/openid-connect/certs}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.security: INFO